<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paweł Klimczewski</title>
    <style>
        /* Twenty Nineteen style — uproszczony */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hoefler Text", "Baskerville Old Face", Garamond, "Times New Roman", serif;
            font-size: 22px;
            line-height: 1.6;
            color: #111;
            background: #fff;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            font-weight: 700;
            line-height: 1.2;
            margin: 2rem 0 1rem;
        }

        h1 {
            font-size: 2.5em;
            margin-top: 0;
        }

        p {
            margin-bottom: 1.5rem;
        }

        a {
            color: #0073aa;
            text-decoration: none;
            border-bottom: 1px solid #0073aa;
        }

        a:hover {
            color: #005177;
            border-bottom-color: #005177;
        }

        .site-header {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 3rem;
        }

        .site-title {
            font-size: 2em;
            margin-bottom: 0.5rem;
        }

        .site-description {
            font-size: 1rem;
            color: #767676;
            font-style: italic;
        }

        .content {
            max-width: 650px;
            margin: 0 auto;
        }

        .entry-content {
            margin-top: 2rem;
        }

        .site-footer {
            text-align: center;
            padding: 3rem 0;
            border-top: 1px solid #eee;
            margin-top: 3rem;
            font-size: 0.875rem;
            color: #767676;
        }

        @media (max-width: 768px) {
            body {
                font-size: 18px;
                padding: 1rem;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <h4 class="site-title">Paweł Klimczewski</h4>
        <p class="site-description">Tego w mediach nie znajdziecie</p>
    </header>

    <main class="content">
        <article class="entry-content">
            <p>Cześć, jestem Paweł. Zajmuję się analizą danych, pisaniem i tworzeniem rzeczy, które mają znaczenie. Ta strona jest w przebudowie — wkrótce więcej.</p>
            
            <p>W międzyczasie możesz się ze mną skontaktować:</p>
            
       <!--     <p><a href="mailto:kontakt@example.com">kontakt@example.com</a></p> -->
        </article>
    </main>

    <footer class="site-footer">
        <p>© 2026 Paweł Klimczewski</p>
    </footer>

</body>
</html>
